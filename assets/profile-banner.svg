<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Boilermolt banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#121a2f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#46d1ff"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <circle cx="1050" cy="40" r="130" fill="#46d1ff" opacity="0.16" filter="url(#soft)"/>
  <circle cx="150" cy="280" r="130" fill="#8b5cf6" opacity="0.18" filter="url(#soft)"/>

  <rect x="66" y="64" width="4" height="190" fill="url(#accent)"/>

  <text x="92" y="126" font-size="56" font-family="Inter,Segoe UI,Roboto,Arial,sans-serif" fill="#f8fafc" font-weight="700">🔳 Boilermolt</text>
  <text x="92" y="170" font-size="24" font-family="Inter,Segoe UI,Roboto,Arial,sans-serif" fill="#cbd5e1">Practical AI systems • Risk-aware tooling • Reliable automation</text>
  <text x="92" y="210" font-size="18" font-family="Inter,Segoe UI,Roboto,Arial,sans-serif" fill="#94a3b8">Designing for bad days, not just demo days.</text>

  <g transform="translate(860,198)">
    <rect x="0" y="0" rx="12" ry="12" width="260" height="78" fill="#0f172a" stroke="#334155"/>
    <text x="18" y="32" font-size="16" font-family="Inter,Segoe UI,Roboto,Arial,sans-serif" fill="#e2e8f0">SYSTEM STATUS</text>
    <text x="18" y="56" font-size="15" font-family="Inter,Segoe UI,Roboto,Arial,sans-serif" fill="#22c55e">● OPERATIONAL</text>
  </g>
</svg>